name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave blank to auto-generate build-<timestamp>-<sha>)'
        required: false
        default: ''
      notes:
        description: 'Extra release notes'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: true

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set. Add the base64-encoded contents of app/google-services.json to repository secrets."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
          if ! python3 -c "import json; json.load(open('app/google-services.json'))" 2>/dev/null; then
            echo "::error::Decoded google-services.json is not valid JSON. Re-encode with: base64 -w0 app/google-services.json"
            exit 1
          fi

      - name: Generate local.properties
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          {
            echo "sdk.dir=$ANDROID_HOME"
            echo "MAPS_API_KEY=${MAPS_API_KEY}"
            echo "APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}"
            echo "APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-https://fra.cloud.appwrite.io/v1}"
            echo "GROQ_API_KEY=${GROQ_API_KEY}"
            echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}"
          } > local.properties

          # Fail fast if the required keys are blank — the build would
          # technically succeed but the resulting APK would have no working
          # backend, AI, or maps. Better to surface this early.
          if [ -z "${APPWRITE_PROJECT_ID}" ]; then
            echo "::error::APPWRITE_PROJECT_ID secret is not set."
            exit 1
          fi
          if [ -z "${MAPS_API_KEY}" ]; then
            echo "::warning::MAPS_API_KEY secret is not set — Maps features will be broken in this build."
          fi

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/ArtisanX.apk
          ls -lh release/

      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="build-$(date -u +'%Y%m%d-%H%M')-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ArtisanX ${{ steps.tag.outputs.tag }}
          files: release/ArtisanX.apk
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            **ArtisanX — Android test build**

            Download `ArtisanX.apk` below and open it on your phone to install.

            Installation:
            1. In your browser/file manager, enable *Install unknown apps* (Settings → Security → Install unknown apps → your browser).
            2. Tap the downloaded APK.
            3. Accept the prompts.

            Min Android version: 7.0 (API 24). For full notification support, Android 13+ is recommended.

            ${{ github.event.inputs.notes }}
